<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520" font-family="'Inter', 'Segoe UI', sans-serif">
  <!-- Background -->
  <rect width="900" height="520" fill="#0f172a" rx="16"/>

  <!-- Title -->
  <text x="450" y="46" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="700" letter-spacing="0.5">Git 3-Branch Strategy</text>
  <text x="450" y="68" text-anchor="middle" fill="#64748b" font-size="13">master · hotfix · development</text>

  <!-- ── Lane labels ── -->
  <text x="32" y="140" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">MASTER</text>
  <text x="32" y="270" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">HOTFIX</text>
  <text x="32" y="400" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">DEVELOPMENT</text>

  <!-- ── Lane lines ── -->
  <!-- master -->
  <line x1="130" y1="132" x2="860" y2="132" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
  <!-- hotfix -->
  <line x1="130" y1="262" x2="860" y2="262" stroke="#f97316" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 4"/>
  <!-- development -->
  <line x1="130" y1="392" x2="860" y2="392" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>

  <!-- ══════════════════════════════════════
       HOTFIX FLOW  (top story)
       ══════════════════════════════════════ -->

  <!-- master: branch-off point for hotfix -->
  <circle cx="200" cy="132" r="9" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>

  <!-- vertical drop master → hotfix -->
  <line x1="200" y1="141" x2="200" y2="253" stroke="#f97316" stroke-width="2" stroke-dasharray="5 3"/>

  <!-- hotfix: branch-off node -->
  <circle cx="200" cy="262" r="9" fill="#f97316" stroke="#c2410c" stroke-width="2"/>

  <!-- hotfix commit -->
  <circle cx="310" cy="262" r="9" fill="#f97316" stroke="#c2410c" stroke-width="2"/>
  <text x="310" y="245" text-anchor="middle" fill="#fed7aa" font-size="10">fix: patch</text>

  <!-- hotfix commit 2 -->
  <circle cx="420" cy="262" r="9" fill="#f97316" stroke="#c2410c" stroke-width="2"/>
  <text x="420" y="245" text-anchor="middle" fill="#fed7aa" font-size="10">fix: verified</text>

  <!-- vertical rise hotfix → master (merge) -->
  <line x1="420" y1="253" x2="420" y2="141" stroke="#f97316" stroke-width="2" stroke-dasharray="5 3"/>

  <!-- master: merge commit from hotfix -->
  <circle cx="420" cy="132" r="11" fill="#f97316" stroke="#fff" stroke-width="2"/>
  <text x="420" y="136" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">M</text>
  <text x="420" y="114" text-anchor="middle" fill="#fb923c" font-size="10" font-weight="600">merge hotfix</text>

  <!-- tag on master after hotfix merge -->
  <rect x="438" y="120" width="56" height="20" rx="4" fill="#1e3a5f"/>
  <text x="466" y="133" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="600">v1.0.1</text>

  <!-- cherry-pick arrow: hotfix → development -->
  <line x1="420" y1="271" x2="420" y2="383" stroke="#a3a3a3" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="420,390 415,378 425,378" fill="#a3a3a3"/>
  <text x="434" y="335" fill="#a3a3a3" font-size="10" font-style="italic">cherry-pick</text>

  <!-- ══════════════════════════════════════
       DEVELOPMENT / RELEASE FLOW (bottom)
       ══════════════════════════════════════ -->

  <!-- dev: start node -->
  <circle cx="200" cy="392" r="9" fill="#22c55e" stroke="#15803d" stroke-width="2"/>

  <!-- feature branch A fork -->
  <line x1="200" y1="383" x2="200" y2="340" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="200" cy="332" r="7" fill="#86efac" stroke="#15803d" stroke-width="1.5"/>
  <text x="200" y="318" text-anchor="middle" fill="#86efac" font-size="9">feat/auth</text>

  <!-- feature A work commits -->
  <line x1="207" y1="332" x2="283" y2="332" stroke="#86efac" stroke-width="1.5" stroke-dasharray="3 2"/>
  <circle cx="290" cy="332" r="7" fill="#86efac" stroke="#15803d" stroke-width="1.5"/>

  <!-- merge feat/auth back to dev -->
  <line x1="290" y1="339" x2="290" y2="383" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="290" cy="392" r="9" fill="#22c55e" stroke="#15803d" stroke-width="2"/>
  <text x="290" y="412" text-anchor="middle" fill="#86efac" font-size="10">feat/auth</text>

  <!-- cherry-pick merge point on dev (from hotfix) -->
  <circle cx="420" cy="392" r="9" fill="#22c55e" stroke="#15803d" stroke-width="2"/>
  <text x="420" y="412" text-anchor="middle" fill="#86efac" font-size="10">cherry-pick</text>

  <!-- feature branch B fork -->
  <line x1="490" y1="383" x2="490" y2="340" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="490" cy="332" r="7" fill="#86efac" stroke="#15803d" stroke-width="1.5"/>
  <text x="490" y="318" text-anchor="middle" fill="#86efac" font-size="9">feat/ui</text>
  <line x1="497" y1="332" x2="563" y2="332" stroke="#86efac" stroke-width="1.5" stroke-dasharray="3 2"/>
  <circle cx="570" cy="332" r="7" fill="#86efac" stroke="#15803d" stroke-width="1.5"/>
  <line x1="570" y1="339" x2="570" y2="383" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="570" cy="392" r="9" fill="#22c55e" stroke="#15803d" stroke-width="2"/>
  <text x="570" y="412" text-anchor="middle" fill="#86efac" font-size="10">feat/ui</text>

  <!-- dev → master (release merge) -->
  <line x1="700" y1="383" x2="700" y2="141" stroke="#22c55e" stroke-width="2" stroke-dasharray="5 3"/>
  <circle cx="700" cy="392" r="9" fill="#22c55e" stroke="#15803d" stroke-width="2"/>
  <text x="700" y="412" text-anchor="middle" fill="#86efac" font-size="10">release ready</text>

  <!-- master: release merge node -->
  <circle cx="700" cy="132" r="11" fill="#22c55e" stroke="#fff" stroke-width="2"/>
  <text x="700" y="136" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">M</text>
  <text x="700" y="114" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">merge dev</text>

  <!-- release tag -->
  <rect x="718" y="120" width="56" height="20" rx="4" fill="#14532d"/>
  <text x="746" y="133" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">v1.1.0</text>

  <!-- master: initial commit -->
  <circle cx="130" cy="132" r="9" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
  <text x="130" y="114" text-anchor="middle" fill="#93c5fd" font-size="10">initial</text>

  <!-- master: tail arrow -->
  <polygon points="858,132 846,127 846,137" fill="#3b82f6"/>

  <!-- ── Legend ── -->
  <rect x="32" y="450" width="830" height="52" rx="10" fill="#1e293b"/>

  <circle cx="80" cy="476" r="7" fill="#3b82f6"/>
  <text x="94" y="480" fill="#cbd5e1" font-size="12">master — production source of truth</text>

  <circle cx="310" cy="476" r="7" fill="#f97316"/>
  <text x="324" y="480" fill="#cbd5e1" font-size="12">hotfix — urgent patches (independent of dev)</text>

  <circle cx="580" cy="476" r="7" fill="#22c55e"/>
  <text x="594" y="480" fill="#cbd5e1" font-size="12">development — new features</text>

  <!-- author credit -->
  <text x="450" y="508" text-anchor="middle" fill="#475569" font-size="10">Based on the Git 3-Branch Strategy by Bibhu Mishra · Meridian</text>
</svg>
